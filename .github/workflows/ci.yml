name: ci

on:
  push:
  pull_request:

jobs:
  test:
    # x86 Linux, no MPS — the CPU path is the source of truth for bit-identity
    # and determinism. A one-bit divergence of the no-op QNM from the plain
    # transformer turns this job red (H₀ wired into the pipeline).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Provision Python 3.12
        run: uv python install 3.12
      - name: Sync (dev + hf extras)
        # `hf` installs transformers (no model weights downloaded). The tiny-random Qwen2
        # seam test + the RMSNorm null-space test run here; real-weight tests are gated behind
        # QNM_RUN_HEAVY (unset in CI), so nothing downloads a model.
        run: uv sync --extra dev --extra hf
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest (CPU)
        run: uv run pytest
